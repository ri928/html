<!DOCTYPE html>
<html>
    <body>
        <h2>unordered list without disc</h2>
        <ul style="list-style-type:none;">
            <li>ritika</li>
            <li>santy</li>
            <li>ripsita</li>
        </ul>
        <h2>unordered list with disc bullet</h2>
        <ul style="list-style-type:disc;">
            <li>ritika</li>
            <li>santy</li>
            <li>ripsita</li>
        </ul>
        <h2>unordered list with circle bullet</h2>
        <ul style="list-style-type:circle;">
            <li>ritika</li>
            <li>santy</li>
            <li>ripsita</li>
        </ul>
        <h2>unordered list with square bullet</h2>
        <ul style="list-style-type:square;">
            <li>ritika</li>
            <li>santy</li>
            <li>ripsita</li>
        </ul>
    </body>
</html>
